<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Mask Demo</title>

    <!-- стили -->
    <link rel="stylesheet" href="/styles/ghost-mask.css">
    <link rel="stylesheet" href="/demo/styles.css">
</head>
<body>

<div class="card">
    <h2>📞 Демо поля ввода текста</h2>
    <div class="field-group">
        <label>Просто текст</label>
        <div class="phone-wrapper">
            <div class="input-container">
                <input
                    class="ghost-mask-input"
                    data-mask="AAAAA"
                    data-preset="text"
                    type="text"
                    placeholder=" "
                    autocomplete="off"
                >

                <div class="mask-placeholder">
                    <span class="ghost-typed"></span>
                    <span class="ghost-remaining"></span>
                </div>
            </div>
        </div>
    </div>
    <div class="field-group">
        <label>Поле ввода номера телефона</label>
        <div class="phone-wrapper">
            <div class="country-code">🇷🇺 +7</div>

            <div class="input-container">
                <input
                    class="ghost-mask-input"
                    data-mask="+7 (912) 345-67-89"
                    data-initial="+7 (987) 654-32-10"
                    data-preset="numeric-separated"
                    type="text"
                    id="phone2"
                    placeholder=" "
                    autocomplete="off"
                    inputmode="numeric"
                >

                <div class="mask-placeholder">
                    <span class="ghost-typed"></span>
                    <span class="ghost-remaining"></span>
                </div>
            </div>
        </div>
    </div>
    <div class="field-group">
        <label>Код</label>
        <div class="phone-wrapper">
            <div class="input-container">
                <input
                    class="ghost-mask-input"
                    data-mask="AAAA1111"
                    data-preset="alnum"
                    type="text"
                    placeholder=" "
                >
                <div class="mask-placeholder">
                    <span class="ghost-typed"></span>
                    <span class="ghost-remaining"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="field-group">
        <label>Серийный номер</label>
        <div class="phone-wrapper">
            <div class="input-container">
                <input
                    class="ghost-mask-input"
                    data-mask="AAAA-1111-BBBB"
                    data-preset="alnum-separated"
                    type="text"
                    placeholder=" "
                >
                <div class="mask-placeholder">
                    <span class="ghost-typed"></span>
                    <span class="ghost-remaining"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="field-group">
        <label>ФИО</label>
        <div class="phone-wrapper">
            <div class="input-container">
                <input
                    class="ghost-mask-input"
                    data-mask="AA AA"
                    data-preset="text-separated"
                    type="text"
                    placeholder=" "
                >
                <div class="mask-placeholder">
                    <span class="ghost-typed"></span>
                    <span class="ghost-remaining"></span>
                </div>
            </div>
        </div>
    </div>
    <div class="field-group">
        <label>Дублирующиеся разделители</label>
        <div class="phone-wrapper">
            <div class="input-container">
                <input
                    class="ghost-mask-input"
                    data-mask="AA AA--AA..AA"
                    data-preset="text-separated"
                    type="text"
                    placeholder=" "
                >
                <div class="mask-placeholder">
                    <span class="ghost-typed"></span>
                    <span class="ghost-remaining"></span>
                </div>
            </div>
        </div>
    </div>
    <div class="field-group">
        <label>Верхний регистр</label>
        <div class="phone-wrapper">
            <div class="input-container">
                <input
                    class="ghost-mask-input"
                    data-mask="AAAAAAAA"
                    data-preset="upper-text"
                    type="text"
                    placeholder=" "
                >
                <div class="mask-placeholder">
                    <span class="ghost-typed"></span>
                    <span class="ghost-remaining"></span>
                </div>
            </div>
        </div>
    </div>
    <div class="field-group">
        <label>Нижний регистр</label>
        <div class="phone-wrapper">
            <div class="input-container">
                <input
                    class="ghost-mask-input"
                    data-mask="AAAAAAAA"
                    data-preset="lower-text"
                    type="text"
                    placeholder=" "
                >
                <div class="mask-placeholder">
                    <span class="ghost-typed"></span>
                    <span class="ghost-remaining"></span>
                </div>
            </div>
        </div>
    </div>
</div>


<script type="module">
    import '../src/auto-init.js';
</script>

</body>
</html>
